name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Build package
        run: python -m build
      - name: Smoke install wheel
        if: matrix.python-version == '3.12'
        run: |
          python -m venv /tmp/semragent-smoke
          /tmp/semragent-smoke/bin/python -m pip install --upgrade pip
          /tmp/semragent-smoke/bin/python -m pip install dist/*.whl
          /tmp/semragent-smoke/bin/semragent --help
          /tmp/semragent-smoke/bin/workspace-docs --help
      - name: Upload dist artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: semragent-dist
          path: dist/*
