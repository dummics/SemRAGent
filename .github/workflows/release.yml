name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build deps
        run: python -m pip install --upgrade pip build
      - name: Run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m unittest discover -s tests -v
      - name: Build package
        run: python -m build
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/semragent-release-smoke
          /tmp/semragent-release-smoke/bin/python -m pip install --upgrade pip
          /tmp/semragent-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/semragent-release-smoke/bin/semragent --help
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
